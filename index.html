<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOSIK • Мои проекты</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(135deg, #121212 0%, #1e1e1e 100%);
            color: #fff;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 500px;
            padding: 40px 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Блок с фото */
        .header-image {
            width: 100%;
            max-width: 250px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            margin-bottom: 25px;
            border: 2px solid rgba(255,255,255,0.05);
        }

        .header-image img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* Заголовок */
        .profile-title {
            text-align: center;
            margin-bottom: 35px;
        }

        .profile-title h1 {
            font-family: 'Montserrat', sans-serif;
            font-weight: 900;
            font-size: 36px;
            letter-spacing: 1px;
            margin: 0 0 5px 0;
            text-transform: uppercase;
            background: linear-gradient(to right, #ffffff, #a0a0a0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .profile-title p {
            font-size: 15px;
            color: #888;
            margin: 0;
            font-weight: 500;
        }

        /* Кнопки */
        .links-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .link-card {
            text-decoration: none;
            color: #fff;
            background-color: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 18px 20px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            backdrop-filter: blur(10px);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: relative;
            overflow: hidden;
        }

        .link-card:hover {
            transform: translateY(-4px);
            background-color: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
        }

        /* Левая полоска при наведении */
        .link-card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            width: 4px;
            height: 100%;
            background: linear-gradient(to bottom, #00C6FF, #0072FF); /* Синий неон */
            transform: scaleY(0);
            transition: transform 0.3s ease;
            transform-origin: bottom;
        }

        .link-card:hover::before {
            transform: scaleY(1);
            transform-origin: top;
        }

        .icon-placeholder {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            background-color: rgba(255,255,255,0.05);
            margin-right: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-shrink: 0;
        }

        .icon-placeholder svg {
            width: 22px;
            height: 22px;
            fill: #fff;
        }

        .text-content {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .link-card h3 {
            font-size: 17px;
            font-weight: 600;
            margin: 0 0 4px 0;
            letter-spacing: 0.3px;
        }

        .link-card p {
            font-size: 13px;
            color: #999;
            margin: 0;
            line-height: 1.3;
        }

        .arrow {
            position: absolute;
            right: 20px;
            opacity: 0;
            transform: translateX(-10px);
            transition: all 0.3s ease;
        }

        .link-card:hover .arrow {
            opacity: 1;
            transform: translateX(0);
        }

        .footer {
            text-align: center;
            margin-top: 40px;
            font-size: 14px;
            color: #777;
            font-weight: 500;
        }
        
        .footer span {
            color: #00C6FF;
        }

        @media (max-width: 480px) {
            .header-image { max-width: 200px; }
            .profile-title h1 { font-size: 30px; }
            .link-card { padding: 16px; }
            .icon-placeholder { width: 40px; height: 40px; margin-right: 12px; }
            .link-card h3 { font-size: 15px; }
            .link-card p { font-size: 12px; }
        }
    </style>
</head>
